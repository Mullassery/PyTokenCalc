---
name: cost_prediction_quality
version: "1.0.0"
description: Validates cost prediction accuracy and reliability
domain: cost_estimation

rules:
  max_error_pct:
    value: 15.0
    description: Predictions must be within 15% of actual costs
    severity: warning

  min_confidence:
    value: 0.70
    description: Minimum confidence score for predictions is 0.70
    severity: warning

  min_model_coverage:
    value: 0.80
    description: Cost model must cover at least 80% of models in portfolio
    severity: warning

anomalies:
  - name: low_confidence
    description: Prediction confidence below acceptable threshold
    severity: warning

  - name: insufficient_model_data
    description: Not enough models profiled for reliable prediction
    severity: warning

  - name: prediction_inaccurate
    description: Actual cost exceeded predicted by more than tolerance
    severity: warning

  - name: model_coverage_gap
    description: Critical models missing from cost estimation dataset
    severity: warning

audit_trail:
  - timestamp: required
  - model: required
  - token_count: required
  - predicted_cost: required
  - confidence: required
  - model_coverage: required
  - actual_cost: optional
  - validation_result: required

expected_improvements:
  prediction_accuracy: "Ensure ±15% prediction accuracy"
  confidence_transparency: "Know when predictions are unreliable"
  resource_allocation: "Allocate compute resources based on reliable predictions"
  cost_optimization: "Identify cost improvement opportunities"
