---
name: provider_reliability
version: "1.0.0"
description: Monitors and validates LLM provider API reliability and consistency
domain: provider_health

rules:
  max_response_time_ms:
    value: 5000
    description: Maximum acceptable API response time is 5 seconds
    severity: warning

  max_error_rate:
    value: 0.05
    description: Maximum acceptable error rate is 5%
    severity: warning

  min_availability:
    value: 0.99
    description: Minimum API availability must be 99%
    severity: critical

  min_consistency:
    value: 0.95
    description: Consistency (same input = same output) must be at least 95%
    severity: warning

anomalies:
  - name: slow_provider
    description: Provider response times exceed threshold
    severity: warning

  - name: high_failure_rate
    description: Provider error rate exceeds acceptable level
    severity: warning

  - name: provider_unreliable
    description: Provider availability falls below 99% SLA
    severity: critical

  - name: inconsistent_results
    description: Same input producing different outputs from provider
    severity: warning

  - name: provider_degradation
    description: Gradual increase in errors or latency detected
    severity: warning

audit_trail:
  - timestamp: required
  - provider: required
  - response_time_ms: required
  - error_rate: required
  - availability: required
  - consistency: required
  - validation_result: required
  - recommendation: optional

recommendations:
  - if_slow: "Consider provider rate limiting or queue optimization"
  - if_unreliable: "Switch to backup provider immediately"
  - if_inconsistent: "Investigate provider implementation changes"
  - if_degrading: "Monitor closely; prepare switchover plan"

expected_improvements:
  reliability: "Auto-detect provider issues before they impact users"
  failover: "Automatically switch to healthy providers"
  cost_optimization: "Route requests to fastest providers"
  compliance: "Maintain SLA audit trails"
