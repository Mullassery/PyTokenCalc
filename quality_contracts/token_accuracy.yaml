---
name: token_count_quality
version: "1.0.0"
description: Validates token counts from provider APIs against baselines and statistical norms
domain: token_counting

rules:
  min_tokens:
    value: 1
    description: Minimum token count must be at least 1
    severity: critical

  max_tokens:
    value: 1000000
    description: Maximum token count cannot exceed 1 million
    severity: critical

  baseline_tolerance_pct:
    value: 5.0
    description: Token count must be within ±5% of historical baseline
    severity: warning

  confidence_threshold:
    value: 0.85
    description: Minimum confidence score required for validation
    severity: warning

anomalies:
  - name: count_out_of_range
    description: Token count falls outside acceptable range
    severity: critical

  - name: baseline_deviation
    description: Token count deviates more than tolerance from baseline
    severity: warning

  - name: unusual_spike
    description: Sudden unexplained increase in token count
    severity: warning

  - name: provider_degradation
    description: Consistent pattern of incorrect counts from provider
    severity: warning

audit_trail:
  - timestamp: required
  - model: required
  - token_count: required
  - baseline: optional
  - validation_result: required
  - compliance_score: required

expected_improvements:
  accuracy_improvement: "95% → 99%"
  error_reduction: "Eliminate 80%+ of token counting errors"
  cost_prediction: "Enable reliable cost predictions"
  provider_reliability: "Auto-detect degraded APIs"
