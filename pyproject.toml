[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin.build"

[project]
name = "pycostaudit"
version = "0.8.2"
description = "Real-time LLM cost tracking and optimization — Rust core with Python API"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [
    {name = "Georgi Mammen Mullassery", email = "mullassery@gmail.com"}
]
keywords = ["claude", "llm", "cost-tracking", "optimization", "budget"]

dependencies = [
    "sqlalchemy>=2.0.0",
    "pydantic>=2.0.0",
    "pandas>=1.5.0",
    "reportlab>=4.0.0",
    "openpyxl>=3.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "mypy>=1.0.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
]

postgres = [
    "psycopg2-binary>=2.9.0",
]

[project.urls]
Homepage = "https://github.com/Mullassery/PyCostAudit"
Repository = "https://github.com/Mullassery/PyCostAudit"
"Bug Tracker" = "https://github.com/Mullassery/PyCostAudit/issues"

[tool.maturin]
module-name = "pycostaudit._core"
manifest-path = "python/Cargo.toml"
python-source = "python/src"

[tool.black]
line-length = 100
target-version = ["py39", "py310", "py311", "py312"]

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
